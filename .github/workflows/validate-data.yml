name: Validate data

# Guards the coach's direct-to-main lane: training/state.md, coach_notes.md,
# challenge_v2.json, and sessions/** are committed to main without a PR (see
# SOUL.md §2). challenge_v2.json and sessions/*.json are consumed by the
# dashboard build (ui/scripts/build-data.mjs) and the quest-log generator, so a
# malformed file would break the Vercel deploy unreviewed. This check catches
# that fast — on the direct push to main, and on any PR that touches the data.

on:
  push:
    branches: [main]
    paths:
      - 'training/challenge_v2.json'
      - 'sessions/*.json'
  pull_request:
    paths:
      - 'training/challenge_v2.json'
      - 'sessions/*.json'

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate JSON parses
        run: |
          python3 - <<'PY'
          import glob, json, sys

          files = ['training/challenge_v2.json'] + sorted(glob.glob('sessions/*.json'))
          bad = []
          checked = 0
          for f in files:
              try:
                  with open(f) as fh:
                      json.load(fh)
                  checked += 1
              except FileNotFoundError:
                  continue
              except json.JSONDecodeError as e:
                  bad.append(f"{f}: {e}")

          if bad:
              print("::error::Invalid JSON — a direct push to main with this would break the dashboard build:")
              for b in bad:
                  print(f"  - {b}")
              sys.exit(1)
          print(f"Validated {checked} JSON file(s) — all parse cleanly.")
          PY
